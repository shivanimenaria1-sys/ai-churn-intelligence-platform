services:
  - type: web
    name: b2b-churn-backend
    env: python
    buildCommand: pip install -r backend/requirements_backend.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
