services:
  - type: web
    name: b2b-churn-backend
    env: python
    buildCommand: pip install -r backend/requirements_backend.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000

  - type: web
    name: b2b-churn-dashboard
    env: python
    buildCommand: pip install -r dashboard/requirements_dashboard.txt
    startCommand: gunicorn dashboard.app:server --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: API_BASE_URL
        value: https://ai-churn-intelligence-platform.onrender.com
